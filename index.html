<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>갈매고 급식 알리미 🍱</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍱</text></svg>">

    <link href="https://fonts.googleapis.com/css2?family=Do+Hyeon&family=Nanum+Gothic+Coding&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body { 
            background: linear-gradient(120deg, #f3fac4 0%, #cdfda1 100%);
            font-family: 'Do Hyeon', sans-serif; 
            min-height: 100vh; padding: 10px;
            letter-spacing: -0.2px;
        }

        .meal-card { 
            max-width: 420px; margin: auto; border-radius: 30px; 
            border: 6px solid white; background-color: rgba(255, 255, 255, 0.97);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 18px;
        }

        /* 날짜 영역: 글자 크기를 모바일에 맞춰 자동 조절 */
        .date-section { 
            display: flex; justify-content: center; align-items: center; 
            gap: 5px; margin-bottom: 12px;
        }
        
        .date-picker-input {
            border: 2px solid #cdfda1; background: #fff; border-radius: 12px;
            font-family: 'Do Hyeon', sans-serif; font-size: 1.1rem; 
            text-align: center; width: 130px; color: #444; padding: 4px;
        }

        .nav-btn { 
            background-color: #ff8e53; color: white; border: none; 
            border-radius: 12px; padding: 4px 10px; font-size: 0.9rem;
        }

        .menu-grid { 
            display: grid; grid-template-columns: repeat(2, 1fr); 
            gap: 8px; margin-top: 10px; 
        }
        
        /* 음식 아이템 스타일 */
        .food-item { 
            background: #fffdf5; 
            border: 2px solid #fff3cd; 
            border-radius: 15px;
            padding: 10px 5px; 
            font-size: 1.15rem; 
            color: #333; 
            text-align: center;
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
            transition: all 0.2s ease; /* 부드러운 변화 효과 추가 */
            cursor: pointer;
        }

        /* PC에서 마우스를 올렸을 때 (Hover) */
        .food-item:hover { 
            background-color: #82fa92; /* 상큼한 연두색으로 변경 */
            border-color: #55efc4;
            transform: translateY(-3px); /* 살짝 위로 떠오르는 효과 */
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            white-space: normal; /* 글자가 길면 전체 다 보여주기 */
            overflow: visible;
            position: relative;
            z-index: 10;
        }

        /* 모바일에서 터치했을 때 (Active) */
        .food-item:active { 
            background-color: #55efc4; 
            transform: scale(0.95); /* 꾹 눌리는 효과 */
        }

        #kcal-tag {
            font-weight: normal !important; 
            background-color: #ff8e53; font-size: 0.9rem; border-radius: 20px; padding: 4px 12px;
        }

        .footer { font-size: 1rem; color: #888; margin-top: 15px; padding-top: 10px; border-top: 1px dashed #ddd; }
        .developer { cursor: pointer; color: #ff6b6b; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="container">
        <div class="card meal-card">
            <div class="text-center">
                <h6 class="text-muted mb-1">🏫갈매고등학교🏫</h6>
                <h2 class="fw-bold mb-3" style="color: #444;">🍴오늘 뭐 나와?🍚</h2>

                <div class="date-section">
                    <button class="nav-btn" onclick="changeDate(-1)">◀ 어제</button>
                    <input type="date" id="date-input" class="date-picker-input" onchange="updateMeal()">
                    <button class="nav-btn" onclick="changeDate(1)">내일 ▶</button>
                </div>

                <div class="d-flex justify-content-center align-items-center gap-2 mb-2">
                    <span id="kcal-tag" class="badge">0 kcal</span>
                    <button class="btn btn-sm" onclick="toggleNutrition()" style="background:#eee; border-radius: 15px; font-family: 'Do Hyeon';">📊 영양성분</button>
                </div>
                
                <div id="nutrition-box" style="font-family: sans-serif; font-size: 0.75rem; background: #f9f9f9; border-radius: 10px; padding: 10px; display: none; text-align: left;"></div>

                <div class="menu-box">
                    <div id="meal-content" class="menu-grid"></div>
                </div>

                <div class="footer">
                    👩‍🏫 만든이: 정보 선생님 <span class="developer" onclick="easterEgg()">김효주</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "94dd3b88730f49469b6245d9c213b99c"; 
        const ATPT_CODE = "J10";
        const SCHUL_CODE = "7531270"; 

        const allergyMap = { 1: "난류", 2: "우유", 3: "메밀", 4: "땅콩", 5: "대두", 6: "밀", 7: "고등어", 8: "게", 9: "새우", 10: "돼지고기", 11: "복숭아", 12: "토마토", 13: "아황산류", 14: "호두", 15: "닭고기", 16: "쇠고기", 17: "오징어", 18: "조개류", 19: "잣" };

        function init() {
            const now = new Date();
            const offset = now.getTimezoneOffset() * 60000;
            const localDate = new Date(now.getTime() - offset);
            document.getElementById('date-input').value = localDate.toISOString().split('T')[0];
            updateMeal();
        }

        async function updateMeal() {
            const dateVal = document.getElementById('date-input').value.replace(/-/g, "");
            const displayArea = document.getElementById('meal-content');
            displayArea.innerHTML = "<div style='grid-column: span 2; padding: 20px;'>찾는 중... 🔍</div>";
            
            try {
                const res = await fetch(`https://open.neis.go.kr/hub/mealServiceDietInfo?KEY=${API_KEY}&Type=json&ATPT_OFCDC_SC_CODE=${ATPT_CODE}&SD_SCHUL_CODE=${SCHUL_CODE}&MLSV_YMD=${dateVal}`);
                const data = await res.json();

                if (data.mealServiceDietInfo) {
                    const row = data.mealServiceDietInfo[1].row[0];
                    const menuData = row.DDISH_NM.split("<br/>");
                    let html = "";

                    menuData.forEach(item => {
                        // 1. 전체 텍스트에서 알레르기 번호 부분만 추출 (맨 뒤의 괄호)
                        const allMatch = item.match(/\(([\d.]+)\)$/); 
                        const allergyNums = allMatch ? allMatch[1] : "";
                        
                        // 2. 메뉴 이름 정제 (모든 괄호와 별표 제거)
                        const cleanName = item.replace(/\(([\d.]+)\)$/, "").replace(/\*/g, "").trim();
                        
                        // 3. 알레르기 번호를 한글로 변환
                        const allergyInfo = allergyNums 
                            ? allergyNums.split('.').map(n => allergyMap[n.trim()]).filter(v => v).join(", ") 
                            : "정보 없음";

                        html += `<div class="food-item" onclick="alert('📢 [${cleanName}]\\n알레르기: ${allergyInfo}')">${cleanName}</div>`;
                    });
                    displayArea.innerHTML = html;
                    document.getElementById('kcal-tag').innerText = `${row.CAL_INFO}`;
                    document.getElementById('nutrition-box').innerHTML = row.NTR_INFO.split("<br/>").join("<br>");
                } else {
                    displayArea.innerHTML = "<div style='grid-column: span 2; padding: 20px;'>급식 없당! 🏖️</div>";
                    document.getElementById('kcal-tag').innerText = "0 kcal";
                }
            } catch (err) {
                displayArea.innerHTML = "<div style='grid-column: span 2;'>로드 실패 ㅠ</div>";
            }
        }
        function changeDate(days) {
            let d = new Date(document.getElementById('date-input').value);
            d.setDate(d.getDate() + days);
            document.getElementById('date-input').value = d.toISOString().split('T')[0];
            updateMeal();
        }

        function toggleNutrition() {
            const box = document.getElementById('nutrition-box');
            box.style.display = (box.style.display === "none" || box.style.display === "") ? "block" : "none";
        }

        function easterEgg() {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            setTimeout(() => { alert("✨ 선생님의 메시지 ✨\n\n\"맛있게 먹고 즐거운 학교생활 하기! 갈매고 화이팅!🧡\""); }, 500);
        }

        init();
    </script>
</body>
</html>
