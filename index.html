<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>갈매고 급식 알리미 🍱</title>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background: linear-gradient(120deg, #rgb(244, 248, 229) 0%, #cdfda1 100%);
            font-family: 'Gaegu', cursive; min-height: 100vh; padding: 20px 10px;
        }
        .meal-card { 
            max-width: 550px; margin: auto; border-radius: 30px; 
            border: 5px solid white; background-color: rgba(255, 255, 255, 0.95);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden;
        }
        .date-picker-input {
            border: none; background: transparent; font-family: 'Gaegu', cursive;
            font-size: 1.4rem; font-weight: bold; text-align: center; width: 150px; color: #444;
        }
        .nav-btn { background-color: #ff8e53; color: white; border: none; border-radius: 12px; padding: 5px 10px; }
        
        /* 메뉴 레이아웃 개선 */
        .menu-grid { 
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2열로 배치 */
            gap: 10px;
            margin-top: 15px;
        }
        
        .food-item { 
            background: white;
            border: 2px solid #fff3cd;
            border-radius: 15px;
            padding: 10px 5px;
            font-size: 1.2rem;
            color: #333;
            cursor: pointer;
            white-space: nowrap;      /* 줄바꿈 방지 */
            overflow: hidden;         /* 넘치는 글자 숨김 */
            text-overflow: ellipsis;  /* 말줄임표(...) 표시 */
            transition: 0.2s;
            display: block;
            text-align: center;
        }
        .food-item:hover { 
            background-color: #ffeaa7; 
            transform: translateY(-3px);
            white-space: normal;      /* 호버 시에는 전체 이름 보이기 */
            overflow: visible;
            position: relative;
            z-index: 10;
        }
        
        .nutrition-details {
            font-family: sans-serif; font-size: 0.85rem; background: #f1f1f1;
            border-radius: 10px; padding: 10px; margin-top: 10px; text-align: left; display: none;
        }
        .toggle-btn {
            background: none; border: 1px solid #6c5ce7; color: #6c5ce7;
            border-radius: 10px; font-size: 0.9rem; padding: 2px 10px; margin-bottom: 5px;
        }
        .footer { margin-top: 20px; font-size: 1rem; color: #777; border-top: 1px solid #eee; padding-top: 10px; }
        .hint { font-size: 0.85rem; color: #ff8e53; }
    </style>
</head>
<body>

    <div class="container">
        <div class="card meal-card p-4">
            <div class="text-center">
                <h4 class="text-muted mb-1">🏫 갈매고등학교</h4>
                <h2 class="fw-bold mb-3">오늘 뭐 나올까?</h2>

                <div class="d-flex justify-content-between align-items-center mb-3">
                    <button class="nav-btn" onclick="changeDate(-1)">◀ 어제</button>
                    <input type="date" id="date-input" class="date-picker-input" onchange="updateMeal()">
                    <button class="nav-btn" onclick="changeDate(1)">내일 ▶</button>
                </div>

                <div class="d-flex justify-content-center gap-2 mb-2">
                    <span id="kcal-tag" class="badge bg-primary" style="font-size: 0.9rem;">칼로리 정보</span>
                    <button class="toggle-btn" onclick="toggleNutrition()">📊 영양 정보</button>
                </div>
                
                <div id="nutrition-box" class="nutrition-details"></div>

                <div class="menu-box p-2">
                    <div class="hint">💡 누르면 알레르기가 떠요!</div>
                    <div id="meal-content" class="menu-grid">
                        </div>
                </div>

                <div class="footer">👩‍🏫 만든이: 정보 선생님 <b>김효주</b></div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "94dd3b88730f49469b6245d9c213b99c"; 
        const ATPT_CODE = "J10";
        const SCHUL_CODE = "7531270";

        const allergyMap = {
            1: "난류", 2: "우유", 3: "메밀", 4: "땅콩", 5: "대두", 6: "밀", 7: "고등어", 8: "게", 
            9: "새우", 10: "돼지고기", 11: "복숭아", 12: "토마토", 13: "아황산류", 14: "호두", 
            15: "닭고기", 16: "쇠고기", 17: "오징어", 18: "조개류", 19: "잣"
        };

        function init() {
            const now = new Date();
            document.getElementById('date-input').value = now.toISOString().split('T')[0];
            updateMeal();
        }

        async function updateMeal() {
            const dateVal = document.getElementById('date-input').value.replace(/-/g, "");
            const displayArea = document.getElementById('meal-content');
            displayArea.innerHTML = "<div style='grid-column: span 2;'>로딩 중... 🔃</div>";
            
            try {
                const res = await fetch(`https://open.neis.go.kr/hub/mealServiceDietInfo?KEY=${API_KEY}&Type=json&ATPT_OFCDC_SC_CODE=${ATPT_CODE}&SD_SCHUL_CODE=${SCHUL_CODE}&MLSV_YMD=${dateVal}`);
                const data = await res.json();

                if (data.mealServiceDietInfo) {
                    const row = data.mealServiceDietInfo[1].row[0];
                    const menuData = row.DDISH_NM.split("<br/>");
                    
                    let html = "";
                    menuData.forEach(item => {
                        const name = item.replace(/\([^)]*\)/g, "").trim();
                        const nums = item.match(/\(([^)]+)\)/);
                        const allergyInfo = nums ? nums[1].split('.').map(n => allergyMap[n.trim()]).filter(v => v).join(", ") : "정보 없음";
                        
                        // 말줄임표 적용을 위한 구조
                        html += `<div class="food-item" title="${name}" onclick="alert('📢 [${name}]\\n알레르기 정보: ${allergyInfo}')">${name}</div>`;
                    });

                    displayArea.innerHTML = html;
                    document.getElementById('kcal-tag').innerText = `🔥 ${row.CAL_INFO}`;
                    document.getElementById('nutrition-box').innerHTML = row.NTR_INFO.split("<br/>").join("<br>");
                } else {
                    displayArea.innerHTML = "<div style='grid-column: span 2;'>급식 정보가 없습니다. 🏖️</div>";
                    document.getElementById('kcal-tag').innerText = "0 kcal";
                }
            } catch (err) {
                displayArea.innerHTML = "<div style='grid-column: span 2;'>데이터 로드 실패!</div>";
            }
        }

        function changeDate(days) {
            let d = new Date(document.getElementById('date-input').value);
            d.setDate(d.getDate() + days);
            document.getElementById('date-input').value = d.toISOString().split('T')[0];
            updateMeal();
        }

        function toggleNutrition() {
            const box = document.getElementById('nutrition-box');
            box.style.display = (box.style.display === "none" || box.style.display === "") ? "block" : "none";
        }

        init();
    </script>
</body>
</html>
